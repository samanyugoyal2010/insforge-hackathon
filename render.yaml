# https://render.com/docs/blueprint-spec
# New → Blueprint → connect repo; or create Web Service → Docker manually.

services:
  - type: web
    name: node0
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      # Set the rest in the Render dashboard (Secrets) — see README “Deploy (Render)”.
